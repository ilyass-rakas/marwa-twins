<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400" role="img" aria-label="Marwa Twin logo">
  <defs>
    <linearGradient id="goldGrad" x1="0" x2="1">
      <stop offset="0%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#E5C158"/>
    </linearGradient>
    <style>
      .title { font-family: 'Playfair Display', serif; font-size: 96px; font-weight: 700; fill: url(#goldGrad); }
      .subtitle { font-family: 'Lora', serif; font-size: 22px; fill: #D4AF37; letter-spacing: 4px; }
    </style>
  </defs>

  <rect width="100%" height="100%" fill="transparent" />

  <text x="50%" y="45%" class="title" dominant-baseline="middle" text-anchor="middle">Marwa Twin</text>
  <text x="50%" y="76%" class="subtitle" dominant-baseline="middle" text-anchor="middle">SALON DE BEAUTÉ | TIFLET</text>

</svg>
